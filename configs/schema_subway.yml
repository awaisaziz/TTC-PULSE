version: 1
name: schema_subway
scope: mvp_step1
source_registry_table: raw_subway_delay_events_registry
bronze_table: bronze_subway_events
notes:
  - Row-preserving Bronze extraction using all-varchar ingest.
  - Source files are immutable and tracked through checksum lineage.
  - Vehicle positions and trip updates are excluded from Step 1.
lineage_columns:
  - lineage_source_file
  - lineage_source_row_number
  - lineage_bronze_loaded_at_utc
  - lineage_source_registry
canonical_columns:
  - canonical_name: event_datetime
    aliases: [Date, Time, Report Date]
    type: timestamp
  - canonical_name: line
    aliases: [Line, Route]
    type: string
  - canonical_name: station
    aliases: [Station, Location]
    type: string
  - canonical_name: delay_minutes
    aliases: [Min Delay, Delay]
    type: integer
  - canonical_name: incident_code
    aliases: [Code]
    type: string
  - canonical_name: incident_description
    aliases: [Incident, Description]
    type: string
